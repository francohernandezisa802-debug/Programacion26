<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Hidratación</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>💧 Calculadora de Hidratación Diaria</h1>

    <p>
        Ingrese su peso corporal para conocer la cantidad aproximada
        de agua que debería consumir diariamente.
    </p>

    <br>

    <label for="peso">Peso corporal (kg)</label>

    <br><br>

    <input
        type="number"
        id="peso"
        placeholder="Ejemplo: 70">

    <br><br>

    <button onclick="calcularAgua()">
    Calcular Consumo de Agua
    </button>

   <button onclick="limpiarCampos()">
    Limpiar
   </button>

   <button onclick="borrarHistorial()">
    Borrar Historial
   </button>

    <br><br>

    <div id="resultado"></div>
    <div id="historial"></div>

    <script src="js/script.js"></script>


</body>

</html>
